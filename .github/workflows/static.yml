1 name: Deploy site to Pages
    2
    3 on:
    4   push:
    5     branches: ["main"]
    6   workflow_dispatch:
    7
    8 permissions:
    9   contents: read
   10   pages: write
   11   id-token: write
   12
   13 jobs:
   14   build:
   15     runs-on: ubuntu-latest
   16     steps:
   17       - name: Checkout
   18         uses: actions/checkout@v4
   19       - name: Setup Node
   20         uses: actions/setup-node@v4
   21         with:
   22           node-version: '20'
   23           cache: 'npm'
   24       - name: Install dependencies
   25         run: npm install
   26       - name: Build
   27         run: npm run build
   28       - name: Upload artifact
   29         uses: actions/upload-pages-artifact@v3
   30         with:
   31           path: './dist'
   32
   33   deploy:
   34     needs: build
   35     runs-on: ubuntu-latest
   36     environment:
   37       name: github-pages
   38       url: ${{ steps.deployment.outputs.page_url }}
   39     steps:
   40       - name: Deploy to GitHub Pages
   41         id: deployment
   42         uses: actions/deploy-pages@v4
